<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #002E5D;
    color: white;
    text-align: center;
    margin: 0;
  }
  h1 { margin: 20px 0; }
  #board {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    justify-content: center;
    gap: 3px;
  }
  .cell {
    width: 40px;
    height: 40px;
    background-color: #A3C1AD;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
  }
  .revealed {
    background-color: #f0f0f0;
    color: black;
    cursor: default;
  }
  .mine { background-color: red; }
  .flag { background-color: #FFD700; }

  #message {
    margin-top: 20px;
    font-size: 24px;
  }

  #retryBtn {
    display: none;
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    background-color: #0057B8;
    color: white;
    cursor: pointer;
    border-radius: 5px;
  }

  #retryBtn:hover {
    background-color: #003f87;
  }
</style>
</head>
<body>
<h1>BYU Minesweeper</h1>
<div id="board"></div>
<div id="message"></div>
<button id="retryBtn" onclick="init()">Retry</button>

<script>
const size = 10;
const minesCount = 30;
let board = [];
let gameOver = false;

function init() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  board = [];
  gameOver = false;
  document.getElementById("message").innerText = "";
  document.getElementById("retryBtn").style.display = "none";

  for (let r = 0; r < size; r++) {
    board[r] = [];
    for (let c = 0; c < size; c++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.row = r;
      cell.dataset.col = c;

      cell.addEventListener("click", handleClick);
      cell.addEventListener("contextmenu", handleRightClick);

      boardDiv.appendChild(cell);
      board[r][c] = { mine: false, revealed: false, flagged: false, count: 0, el: cell };
    }
  }

  placeMines();
  calculateNumbers();
}

function placeMines() {
  let placed = 0;
  while (placed < minesCount) {
    let r = Math.floor(Math.random() * size);
    let c = Math.floor(Math.random() * size);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      placed++;
    }
  }
}

function calculateNumbers() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c].mine) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          let nr = r + dr;
          let nc = c + dc;
          if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr][nc].mine) {
            count++;
          }
        }
      }
      board[r][c].count = count;
    }
  }
}

function handleClick(e) {
  if (gameOver) return;
  const r = e.target.dataset.row;
  const c = e.target.dataset.col;
  reveal(r, c);
  checkWin();
}

function handleRightClick(e) {
  e.preventDefault();
  if (gameOver) return;
  const r = e.target.dataset.row;
  const c = e.target.dataset.col;
  let cell = board[r][c];
  if (cell.revealed) return;

  cell.flagged = !cell.flagged;
  cell.el.classList.toggle("flag");
  cell.el.innerText = cell.flagged ? "🚩" : "";
}

function reveal(r, c) {
  let cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  cell.revealed = true;
  cell.el.classList.add("revealed");

  if (cell.mine) {
    cell.el.classList.add("mine");
    cell.el.innerText = "💣";
    gameOver = true;
    revealAll();
    document.getElementById("message").innerText = "💀 Game Over!";
    document.getElementById("retryBtn").style.display = "inline-block";
    return;
  }

  if (cell.count > 0) {
    cell.el.innerText = cell.count;
  } else {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        let nr = r + dr;
        let nc = c + dc;
        if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
          reveal(nr, nc);
        }
      }
    }
  }
}

function revealAll() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      let cell = board[r][c];
      if (cell.mine) {
        cell.el.classList.add("mine");
        cell.el.innerText = "💣";
      }
    }
  }
}

function checkWin() {
  let safeCells = size * size - minesCount;
  let revealed = 0;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c].revealed && !board[r][c].mine) revealed++;
    }
  }

  if (revealed === safeCells) {
    gameOver = true;
    document.getElementById("message").innerText = "🎉 Congratulations! You Win!";
    document.getElementById("retryBtn").style.display = "inline-block";
  }
}

init();
</script>
</body>
</html>
